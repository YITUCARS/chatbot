<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <rect width="1200" height="630" fill="#f7f5f1"/>

  <!-- 顶部装饰条：navy 主调 + 橙色短色段 -->
  <rect x="0" y="0" width="1200" height="8" fill="#171c61"/>
  <rect x="0" y="0" width="380" height="8" fill="#ea5514"/>

  <!-- 主品牌名：YITU（带橙色 T 呼应原 logo 风格）+ 旅行助手 -->
  <g font-family="'PingFang SC','Microsoft YaHei',-apple-system,sans-serif" text-anchor="middle">
    <!-- 字间细装饰 -->
    <line x1="555" y1="170" x2="645" y2="170" stroke="#ea5514" stroke-width="3"/>

    <!-- YITU 拉丁部分：navy 大字 + 橙色 T -->
    <text x="600" y="265" font-size="100" font-weight="800" letter-spacing="8">
      <tspan fill="#171c61">YI</tspan><tspan fill="#ea5514">T</tspan><tspan fill="#171c61">U</tspan>
    </text>

    <!-- 中文主名 -->
    <text x="600" y="365" font-size="68" font-weight="700" fill="#171c61" letter-spacing="8">旅行助手</text>

    <!-- 副标 -->
    <text x="600" y="445" font-size="30" font-weight="500" fill="#171c61" opacity="0.78" letter-spacing="3">
      在线智能客服 · 7×24 小时在线问答
    </text>

    <!-- 能力 tagline -->
    <text x="600" y="510" font-size="24" font-weight="400" fill="#1a1714" opacity="0.62" letter-spacing="2">
      行程规划 · 美食推荐 · 路标识别 · 旅行攻略 · 当地建议
    </text>

    <!-- 域名 -->
    <text x="600" y="580" font-family="'DM Sans','Helvetica Neue',-apple-system,sans-serif"
          font-size="22" font-weight="500" fill="#1a1714" opacity="0.5" letter-spacing="1">
      chat.yiturentalcars.co.nz
    </text>
  </g>

  <!-- 底部装饰条 -->
  <rect x="0" y="622" width="1200" height="8" fill="#171c61"/>
  <rect x="820" y="622" width="380" height="8" fill="#ea5514"/>
</svg>
