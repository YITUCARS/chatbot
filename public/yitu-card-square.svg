<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <rect width="1024" height="1024" fill="#f7f5f1"/>

  <!-- 顶部装饰条 -->
  <rect x="0" y="0" width="1024" height="10" fill="#171c61"/>
  <rect x="0" y="0" width="340" height="10" fill="#ea5514"/>

  <g font-family="'PingFang SC','Microsoft YaHei',-apple-system,sans-serif" text-anchor="middle">
    <!-- 顶部小副品牌 -->
    <text x="512" y="220" font-size="22" font-weight="500" fill="#171c61" opacity="0.55" letter-spacing="8">
      NEW ZEALAND TRAVEL ASSISTANT
    </text>

    <!-- 橙色装饰线 -->
    <line x1="442" y1="260" x2="582" y2="260" stroke="#ea5514" stroke-width="3"/>

    <!-- YITU 大字 -->
    <text x="512" y="430" font-size="170" font-weight="800" letter-spacing="14">
      <tspan fill="#171c61">YI</tspan><tspan fill="#ea5514">T</tspan><tspan fill="#171c61">U</tspan>
    </text>

    <!-- 中文主名 -->
    <text x="512" y="555" font-size="92" font-weight="700" fill="#171c61" letter-spacing="14">旅行助手</text>

    <!-- 中部装饰圆点 -->
    <circle cx="512" cy="620" r="5" fill="#ea5514"/>

    <!-- 副标 -->
    <text x="512" y="690" font-size="32" font-weight="600" fill="#171c61" opacity="0.85" letter-spacing="3">
      在线智能客服 · 7×24 小时在线
    </text>

    <!-- 能力 tagline 多行排版 -->
    <text x="512" y="770" font-size="26" font-weight="400" fill="#1a1714" opacity="0.7" letter-spacing="2">
      行程规划 · 美食推荐 · 路标识别
    </text>
    <text x="512" y="815" font-size="26" font-weight="400" fill="#1a1714" opacity="0.7" letter-spacing="2">
      旅行攻略 · 当地建议 · 拍照问答
    </text>

    <!-- 域名 -->
    <text x="512" y="910" font-family="'DM Sans','Helvetica Neue',-apple-system,sans-serif"
          font-size="24" font-weight="500" fill="#1a1714" opacity="0.55" letter-spacing="1">
      chat.yiturentalcars.co.nz
    </text>
  </g>

  <!-- 底部装饰条 -->
  <rect x="0" y="1014" width="1024" height="10" fill="#171c61"/>
  <rect x="684" y="1014" width="340" height="10" fill="#ea5514"/>
</svg>
