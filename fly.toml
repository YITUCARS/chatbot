# fly.toml app configuration file generated for chatbot-dr0rjw on 2026-05-11T07:47:30Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.

app = "chatbot-dr0rjw"
primary_region = "ams"

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  PORT = "3000"
  DB_DIR = "/data"

[[mounts]]
  source = "data"
  destination = "/data"
  auto_extend_size_threshold = 80
  auto_extend_size_increment = "1GB"
  auto_extend_size_limit = "10GB"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "15s"
    method = "get"
    path = "/api/chat/config"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
